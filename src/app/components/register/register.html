<form [formGroup]="regForm" (submit)="register()">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Name</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
    name="name" formControlName="name">

     </div>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
    name="email" formControlName="email">
     </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Password</label>
    <input type="password" class="form-control" id="exampleInputPassword1"
     name="password" formControlName = "password">
  </div>
  <div formGroupName ="address">
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">city</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
    name = "city" formControlName ="city">
     </div>
     <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">street</label>
    <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
    name = "street" formControlName ="street">
     </div>
     </div>
     <div formArrayName ="phoneNums">
      @for (ph of phones.controls; track $index; let i =$index  ) {
     <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">phoneNumber</label>
    <input type="number" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp"
    name="phone" [formControlName]="i">
    </div>}
   <button class ="btn btn-primary "(click)="addPhone()" >add</button>
  </div>


  <button type="submit" class="btn btn-primary" [disabled]="regForm.invalid">Submit</button>
</form>
