
<form action=""  (submit)="AddProduct()" #addform = "ngForm">
    <div class = "mb-3">
        <label for="exampleInputEmail" class="form-label" id ="exampleInputEmail">Name: </label>
        <input type="text" class="form-control" name = "name" [(ngModel)]="NewProduct.name"
        required
        pattern="^[a-zA-Z]{3,15}$"
        #newprdaname ="ngModel" >
@if(newprdaname.invalid && newprdaname.touched ){
    <div class = "text-danger">
      @if (newprdaname.errors?.['required']) {
      <p>name is Required</p>}
      @if(newprdaname.errors?.['pattern']){
      <p>must be at least</p>}
    </div>}
      </div>

     <div class = "mb-3">
        <label for="exampleInputPassword1" class="form-label" >price: </label>
        <input type="number" class="form-control" name ="price" [(ngModel)]="NewProduct.price"
        required
        pattern="^[0-9]"
        #newprdprice = "ngModel">
        @if(newprdprice.invalid && newprdprice.touched){
        <div class="text-danger">
          @if(newprdprice.errors?.['required']){
          <p>*required</p>}

               </div>}
    </div>
     <div class = "mb-3">
        <label for="exampleInputPassword1" class="form-label" >Quantity: </label>
        <input type="text" class="form-control" name ="quantity" [(ngModel)]="NewProduct.quantity">
    </div>
     <div class = "mb-3">
        <label for="exampleInputPassword1" class="form-label" >Image: </label>
        <input type="file" class="form-control" name = "imageUrl" [(ngModel)]="NewProduct.imageUrl">
    </div>


<div class="mb-3" >
  <label for="categorySelect">Select Category:</label>
  <select class="form-select" aria-label="Default select example" name ="categoryId" [(ngModel)]="NewProduct.categoryId">
    <option selected value="0">All</option >
    @for (cat of categories; track $index) {
      <option  [value]="cat.id" >{{cat.name}}</option>}

  </select>
 <input type="submit" value="submit" class ="btn btn-success" [disabled]="addform.invalid">
</div>
</form>
