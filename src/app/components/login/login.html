<div class="row">
 <form (ngSubmit)="onsubmit(logForm)" #logForm="ngForm">
  <div class=">form-group">

      <label  for="email">Email :</label>
    <input   class="form-control" type="email" name ='email'
    [(ngModel)]="email"
    email
    required
    >

 <label  for="password">password :</label>
    <input   class="form-control" type="password" name ='password'
 [(ngModel)]="password"
 required
 minlength="3">
  </div>
  <div class="alert alert-danger">
<p>{{error()}}</p>
  </div>
<button class = "btn btn-success" type="submit" [disabled]="logForm.invalid"  >{{isLogginMode?'login':'signup'}}</button>
<button class = "btn btn-primary"  type="button" [disabled] !="Isloggeduser" (click)="switchmode()">switch to {{isLogginMode?'signup':'login'}}</button>

</form>
</div>
