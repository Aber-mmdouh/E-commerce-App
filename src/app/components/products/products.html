  <div class="row row-cols-1 row-cols-md-4 g-4">
    @for (prd of filterproducts; track prd.id) {
      <div class="col">
    <div class="card" >
      <img class="card-img-top" src="{{prd.imageUrl}}" alt="Card image cap">
      <div class="card-body" Apphighlighter="gray" excolor = 'gray'>
        <h5 class="card-title">{{prd.name}}</h5>
        <p class="card-text">price :{{prd.price |currency:'EUR'}}</p>
        <p class="card-text">quantity  :{{prd.quantity}}</p>
        <input  type="number" #Inputq>
        <button class="btn btn-success" (click)="buy(Inputq.value, prd.price)">Buy</button>
        <button class ='btn btn-primary' (click)="navigate(prd.id)">Details</button>
      </div>
    </div>
  </div>}

  </div>
